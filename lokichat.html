<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokiChat | Private</title>
    <style>
        :root { --bg: #000; --surf: #111; --text: #fff; --msg-me: #222; --msg-them: #333; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        
        /* Kayıt Ekranı */
        #auth { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; }
        .box { background: var(--surf); padding: 30px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 80%; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Ana Ekran */
        header { padding: 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #chat-list { flex: 1; overflow-y: auto; }
        .user-row { padding: 15px; border-bottom: 1px solid #111; display: flex; align-items: center; cursor: pointer; }
        .user-row:hover { background: #050505; }
        .avatar { width: 45px; height: 45px; background: #222; border-radius: 50%; margin-right: 15px; }

        /* Sohbet Penceresi */
        #chat-win { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; }
        #msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .m { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .sent { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 2px; }
        .recv { align-self: flex-start; background: var(--msg-them); border-bottom-left-radius: 2px; }

        /* + Butonu */
        .add-btn { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: #fff; color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; border: none; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="auth">
    <div class="box">
        <h2>LokiChat</h2>
        <input type="text" id="myname" placeholder="Adını yaz...">
        <button onclick="login()">Hesap Oluştur</button>
    </div>
</div>

<header>
    <span>LokiChat</span>
    <small id="status" style="color: #666;"></small>
</header>

<div id="chat-list"></div>

<button class="add-btn" onclick="showModal()">+</button>

<div id="modal">
    <div class="box">
        <h3>Kişi Ekle</h3>
        <div id="global-users">
            <div class="user-row" onclick="add('Arda')">Arda</div>
            <div class="user-row" onclick="add('Selin')">Selin</div>
            <div class="user-row" onclick="add('Mert')">Mert</div>
            <div class="user-row" onclick="add('Can')">Can</div>
        </div>
        <button onclick="hideModal()" style="margin-top: 10px; background: #333; color: #fff;">Kapat</button>
    </div>
</div>

<div id="chat-win">
    <header>
        <button onclick="hideChat()" style="background:none; color:#fff; border:none; font-size:20px;">←</button>
        <span id="target-name"></span>
        <span></span>
    </header>
    <div id="msgs"></div>
    <div style="padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px;">
        <input type="text" id="m-inp" placeholder="Mesajın...">
        <button onclick="send()" style="width: auto;">Gönder</button>
    </div>
</div>

<script>
    let me = localStorage.getItem('loki_me');
    let chats = JSON.parse(localStorage.getItem('loki_db')) || {};
    let active = "";

    window.onload = () => {
        if(me) { 
            document.getElementById('auth').style.display = 'none';
            document.getElementById('status').innerText = me;
            renderList();
        }
        cleaner(); // Eski mesajları uçur
    };

    function login() {
        let n = document.getElementById('myname').value;
        if(!n) return;
        localStorage.setItem('loki_me', n);
        location.reload();
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    function add(name) {
        if(!chats[name]) chats[name] = [];
        save();
        renderList();
        hideModal();
    }

    function renderList() {
        let html = "";
        Object.keys(chats).forEach(u => {
            html += `<div class="user-row" onclick="openChat('${u}')">
                <div class="avatar"></div>
                <div><b>${u}</b><br><small style="color:#555">Sohbeti aç</small></div>
            </div>`;
        });
        document.getElementById('chat-list').innerHTML = html;
    }

    function openChat(u) {
        active = u;
        document.getElementById('target-name').innerText = u;
        document.getElementById('chat-win').style.display = 'flex';
        renderMsgs();
    }

    function hideChat() { document.getElementById('chat-win').style.display = 'none'; }

    function send() {
        let i = document.getElementById('m-inp');
        if(!i.value) return;
        chats[active].push({ t: i.value, s: 'me', d: Date.now() });
        save();
        i.value = "";
        renderMsgs();
    }

    function renderMsgs() {
        let mDiv = document.getElementById('msgs');
        mDiv.innerHTML = "";
        chats[active].forEach(m => {
            mDiv.innerHTML += `<div class="m ${m.s == 'me' ? 'sent' : 'recv'}">${m.t}</div>`;
        });
        mDiv.scrollTop = mDiv.scrollHeight;
    }

    function save() { localStorage.setItem('loki_db', JSON.stringify(chats)); }

    // 24 SAAT SONRA KENDİNİ İMHA ETME SİSTEMİ (PATLAMA ÖZELLİĞİ)
    function cleaner() {
        const day = 24 * 60 * 60 * 1000;
        const now = Date.now();
        Object.keys(chats).forEach(u => {
            chats[u] = chats[u].filter(m => (now - m.d) < day);
        });
        save();
    }
</script>
</body>
</html>
