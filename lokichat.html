<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b141a; color: #e9edef; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        .chat-bg { background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-color: #0b141a; opacity: 0.06; position: absolute; inset: 0; z-index: -1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .message-in { background-color: #202c33; border-radius: 0 8px 8px 8px; align-self: flex-start; }
        .message-out { background-color: #005c4b; border-radius: 8px 0 8px 8px; align-self: flex-end; }
        .glass { background: rgba(32, 44, 51, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex h-screen">

    <div class="w-1/3 border-r border-gray-700 flex flex-col glass">
        <header class="p-4 bg-[#202c33] flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-emerald-500 flex items-center justify-center font-bold">ME</div>
                <span class="font-semibold">Sohbetler</span>
            </div>
            <button id="addUserBtn" class="text-emerald-500 hover:bg-gray-700 p-2 rounded-full transition">
                <i class="fas fa-plus fa-lg"></i>
            </button>
        </header>

        <div id="chatList" class="flex-1 overflow-y-auto">
            </div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div class="chat-bg"></div>
        
        <header id="chatHeader" class="p-4 bg-[#202c33] flex items-center gap-4 hidden">
            <div id="activeAvatar" class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center"></div>
            <div>
                <h2 id="activeUserName" class="font-bold"></h2>
                <p class="text-xs text-emerald-500">Çevrimiçi</p>
            </div>
        </header>

        <div id="messageArea" class="flex-1 p-6 overflow-y-auto flex flex-col gap-3">
            <div class="m-auto text-gray-500 text-sm text-center">
                <i class="fas fa-lock mb-2"></i><br>
                Mesajlar 12 saat sonra otomatik olarak silinir.
            </div>
        </div>

        <footer id="inputArea" class="p-4 bg-[#202c33] flex items-center gap-3 hidden">
            <button class="text-gray-400 hover:text-white"><i class="far fa-smile fa-xl"></i></button>
            <input id="msgInput" type="text" placeholder="Bir mesaj yazın" class="flex-1 bg-[#2a3942] p-3 rounded-lg outline-none text-white">
            <button id="sendBtn" class="text-emerald-500"><i class="fas fa-paper-plane fa-xl"></i></button>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50">
        <div class="bg-[#202c33] p-6 rounded-xl w-96 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Yeni Kişi Ekle</h3>
            <input id="userNameInput" type="text" placeholder="Kullanıcı Adı" class="w-full bg-[#2a3942] p-3 rounded-lg mb-4 outline-none border border-gray-600 focus:border-emerald-500">
            <div class="flex justify-end gap-3">
                <button onclick="toggleModal()" class="px-4 py-2 text-gray-400">İptal</button>
                <button onclick="saveUser()" class="px-6 py-2 bg-emerald-600 rounded-lg font-bold">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('wa_users')) || [];
        let messages = JSON.parse(localStorage.getItem('wa_messages')) || [];
        let activeChat = null;

        const EXPIRE_TIME = 12 * 60 * 60 * 1000; // 12 Saat

        function init() {
            cleanOldMessages();
            renderUserList();
            setInterval(cleanOldMessages, 60000); // Her dakika kontrol et
        }

        function toggleModal() {
            document.getElementById('modal').classList.toggle('hidden');
        }

        function saveUser() {
            const name = document.getElementById('userNameInput').value.trim();
            if (!name) return;

            const newUser = {
                id: Date.now(),
                name: name,
                avatarColor: `#${Math.floor(Math.random()*16777215).toString(16)}`
            };

            users.push(newUser);
            localStorage.setItem('wa_users', JSON.stringify(users));
            document.getElementById('userNameInput').value = '';
            toggleModal();
            renderUserList();
        }

        function renderUserList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';
            users.forEach(user => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-4 hover:bg-[#2a3942] cursor-pointer transition border-b border-gray-800/50";
                div.onclick = () => openChat(user);
                div.innerHTML = `
                    <div class="w-12 h-12 rounded-full flex items-center justify-center font-bold text-white shadow-lg" style="background-color: ${user.avatarColor}">
                        ${user.name.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between">
                            <h4 class="font-semibold">${user.name}</h4>
                            <span class="text-xs text-gray-500">12s</span>
                        </div>
                        <p class="text-sm text-gray-400 truncate">Sohbeti başlatmak için tıkla...</p>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function openChat(user) {
            activeChat = user;
            document.getElementById('chatHeader').classList.remove('hidden');
            document.getElementById('inputArea').classList.remove('hidden');
            document.getElementById('activeUserName').innerText = user.name;
            document.getElementById('activeAvatar').style.backgroundColor = user.avatarColor;
            document.getElementById('activeAvatar').innerText = user.name.charAt(0).toUpperCase();
            renderMessages();
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeChat) return;

            const msg = {
                id: Date.now(),
                sender: 'me',
                receiverId: activeChat.id,
                text: text,
                timestamp: Date.now()
            };

            messages.push(msg);
            localStorage.setItem('wa_messages', JSON.stringify(messages));
            input.value = '';
            renderMessages();
        }

        function renderMessages() {
            const area = document.getElementById('messageArea');
            area.innerHTML = '';
            const filtered = messages.filter(m => m.receiverId === activeChat.id);

            filtered.forEach(m => {
                const div = document.createElement('div');
                div.className = `max-w-[70%] p-2 px-4 shadow-md mb-2 ${m.sender === 'me' ? 'message-out' : 'message-in'}`;
                div.innerHTML = `
                    <p class="text-[15px] leading-relaxed">${m.text}</p>
                    <span class="text-[10px] text-gray-400 block text-right mt-1">
                        ${new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                    </span>
                `;
                area.appendChild(div);
            });
            area.scrollTop = area.scrollHeight;
        }

        function cleanOldMessages() {
            const now = Date.now();
            const initialCount = messages.length;
            messages = messages.filter(m => (now - m.timestamp) < EXPIRE_TIME);
            if (messages.length !== initialCount) {
                localStorage.setItem('wa_messages', JSON.stringify(messages));
                if (activeChat) renderMessages();
            }
        }

        document.getElementById('addUserBtn').onclick = toggleModal;
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        init();
    </script>
</body>
</html>
